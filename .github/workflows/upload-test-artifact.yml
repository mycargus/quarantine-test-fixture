name: Quarantine CI

# Dogfood: runs quarantine against a deliberately flaky Jest test suite.
# Produces real quarantine-results artifacts, creates real GitHub Issues for
# flaky tests, and exercises the full quarantine flow including PR comments.
#
# After quarantine run completes, a cleanup step closes quarantine issues
# older than 1 day. This creates a perpetual cycle:
#   detect flaky → quarantine → close issue → unquarantine → detect again
# Every daily run exercises the full detect/quarantine/unquarantine path.
#
# The quarantine E2E tests in the main repo observe this workflow's real output:
#   - test/e2e/quarantine-observe.test.js  — reads state, artifacts, issues, PR comments
#   - test/e2e/github-artifacts.test.js    — verifies artifacts API shape
#   - test/e2e/dashboard-sync.test.js      — exercises dashboard sync pipeline

on:
  push:
    branches: [main]
  schedule:
    # Daily — keeps artifacts fresh (they expire after 90 days)
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write # quarantine state branch
  issues: write # quarantine creates issues for flaky tests

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      # No release exists yet — build from source.
      # TODO: Replace with release binary download once quarantine publishes releases.
      - name: Install quarantine CLI
        run: |
          git clone --depth 1 https://github.com/mycargus/quarantine.git /tmp/quarantine
          cd /tmp/quarantine/cli
          go build -o /usr/local/bin/quarantine ./cmd/quarantine

      - name: Install test dependencies
        run: npm install

      # Close quarantine issues older than 1 day. This unquarantines the
      # tests so the next quarantine run detects them as flaky again,
      # creating a perpetual detect → quarantine → unquarantine cycle.
      - name: Close stale quarantine issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CUTOFF=$(date -u -d '1 day ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null \
            || date -u -v-1d '+%Y-%m-%dT%H:%M:%SZ')
          gh issue list --label quarantine --state open --json number,createdAt --jq \
            ".[] | select(.createdAt < \"$CUTOFF\") | .number" \
          | while read -r num; do
              echo "Closing stale quarantine issue #$num"
              gh issue close "$num"
            done

      # Ensure a long-lived issue exists to serve as a PR comment proxy.
      # quarantine run posts PR comments when --pr is supplied. E2E tests
      # observe the comment on this issue to verify the flow works.
      - name: Ensure PR comment proxy issue exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure the label exists (idempotent — ignores 422 Unprocessable Entity if it exists)
          gh api -X POST /repos/${{ github.repository }}/labels \
            -f name="e2e-pr-proxy" \
            -f color="0075ca" \
            -f description="Long-lived PR comment proxy issue for E2E tests" \
            2>/dev/null || true
          PROXY=$(gh issue list --label e2e-pr-proxy --state open --json number --jq '.[0].number // empty')
          if [ -z "$PROXY" ]; then
            URL=$(gh issue create \
              --title "E2E PR comment proxy — do not close" \
              --label e2e-pr-proxy \
              --body "Long-lived issue used as a PR stand-in so quarantine CI exercises the PR comment create/update flow. E2E tests observe the comment. Do not close.")
            PROXY=$(echo "$URL" | grep -oE '[0-9]+$')
          fi
          echo "PR_PROXY=$PROXY" >> "$GITHUB_ENV"

      # quarantine exit codes:
      #   0 = all tests passed or all failures were flaky (quarantined)
      #   1 = genuine test failures remain
      #   2 = quarantine infrastructure error (strict mode)
      #
      # Do NOT use continue-on-error here. Exit 1 means real failures that
      # the team needs to fix — the workflow should fail to surface that.
      # The artifact upload uses `if: always()` so results are available
      # for debugging regardless of the exit code.
      - name: Run tests with quarantine
        env:
          QUARANTINE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: quarantine run jest-tests --pr "$PR_PROXY"

      - name: Upload quarantine results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quarantine-results-jest-tests-${{ github.run_id }}
          path: .quarantine/jest-tests/results.json
          retention-days: 90
          if-no-files-found: warn
